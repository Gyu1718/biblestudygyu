name: Apply Romans study patch
on:
  push:
    branches: [agent/add-romans-study]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct patch
        shell: bash
        run: |
          cat .romans-build/part-*.b64 | base64 -d > /tmp/romans-patch.tar.gz
          echo "5cfb3d8c048580a84275bd710ee5f0a4eb5f050d5b0dae748bd7b650d273cd09  /tmp/romans-patch.tar.gz" | sha256sum -c -
          tar -xzf /tmp/romans-patch.tar.gz -C .
      - name: Build links and validate
        shell: bash
        run: |
          python3 tools/build_links.py nt/romans rom
          python3 tools/validate.py
      - name: Commit generated files
        shell: bash
        run: |
          rm -rf .romans-build .github/workflows/apply-romans-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Romans study scaffold"
          git push
