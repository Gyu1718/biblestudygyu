name: Validate and apply Bible reader

on:
  push:
    branches: [main]
    paths:
      - "ot/**/*.html"
      - "nt/**/*.html"
      - "theology/**/*.html"
      - "bible/**"
      - "assets/js/bible-reader.js"
      - "assets/js/original-reader.js"
      - "assets/css/bible-reader.css"
      - "assets/css/original-reader.css"
      - "assets/data/bible/kor/**"
      - "assets/data/bible/original/na28/**"
      - "tools/apply_bible_reader.py"
      - "tools/extract_na28_epub.py"
      - ".github/workflows/bible-reader.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply shared reader to study pages
        run: python3 tools/apply_bible_reader.py --write

      - name: Validate Korean Bible corpus
        run: |
          python3 - <<'PY'
          import gzip
          import json
          from pathlib import Path

          root = Path("assets/data/bible/kor")
          manifest = json.loads((root / "manifest.json").read_text(encoding="utf-8"))
          if "chunks" not in manifest or len(manifest.get("books", {})) < 66:
              print("전체 성경 패키지 업로드 전이므로 본문 검증을 건너뜁니다.")
              raise SystemExit(0)
          assert len(manifest["books"]) == 66, "성경 66권 목록이 아닙니다"

          loaded = {}
          for info in manifest["chunks"].values():
              path = root / info["path"]
              with gzip.open(path, "rt", encoding="utf-8") as handle:
                  chunk = json.load(handle)
              loaded.update(chunk.get("books", chunk))

          assert set(loaded) == set(manifest["books"]), "본문과 목록의 책 구성이 다릅니다"
          total = sum(
              len(verses)
              for book in loaded.values()
              for verses in book["chapters"].values()
          )
          assert total == 31102, f"총 절 수가 올바르지 않습니다: {total}"
          print(f"개역개정 66권 {total:,}절 검증 완료")
          PY

      - name: Validate NA28 corpus when uploaded
        run: |
          python3 - <<'PY'
          import gzip
          import json
          from pathlib import Path

          root = Path("assets/data/bible/original/na28")
          manifest_path = root / "manifest.json"
          if not manifest_path.exists():
              print("NA28 manifest가 없어 검증을 건너뜁니다.")
              raise SystemExit(0)

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          paths = [root / info["path"] for info in manifest.get("chunks", {}).values()]
          missing = [str(path) for path in paths if not path.exists()]
          if missing:
              print("NA28 압축 묶음 업로드 전이므로 본문 검증을 건너뜁니다.")
              for path in missing:
                  print(f"- missing: {path}")
              raise SystemExit(0)

          loaded = {}
          for path in paths:
              with gzip.open(path, "rt", encoding="utf-8") as handle:
                  chunk = json.load(handle)
              loaded.update(chunk.get("books", chunk))

          assert len(loaded) == 27, f"NA28 책 수 오류: {len(loaded)}"
          chapters = sum(len(book["chapters"]) for book in loaded.values())
          verses = sum(
              len(chapter)
              for book in loaded.values()
              for chapter in book["chapters"].values()
          )
          assert chapters == 260, f"NA28 장 수 오류: {chapters}"
          assert verses == 7941, f"NA28 장절 표지 수 오류: {verses}"
          print(f"NA28 27권 {chapters}장 {verses:,}개 장절 표지 검증 완료")
          PY

      - name: Validate shared reader links
        run: python3 tools/apply_bible_reader.py --check

      - name: Commit generated HTML changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No generated changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for directory in ot nt theology; do
            if [ -d "$directory" ]; then
              git add "$directory"
            fi
          done
          if git diff --cached --quiet; then
            echo "No generated HTML changes"
            exit 0
          fi
          git commit -m "Apply shared Bible reader to study pages"
          git push origin main
