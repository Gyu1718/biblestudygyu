name: Build and apply Bible reader

on:
  push:
    branches: [main]
    paths:
      - "ot/**/*.html"
      - "nt/**/*.html"
      - "theology/**/*.html"
      - "assets/js/bible-reader.js"
      - "assets/css/bible-reader.css"
      - "assets/data/bible/kor/**"
      - "tools/build_bible_data.py"
      - "tools/apply_bible_reader.py"
      - ".github/workflows/bible-reader.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build Bible data
        run: python3 tools/build_bible_data.py

      - name: Apply shared reader to study pages
        run: python3 tools/apply_bible_reader.py --write

      - name: Validate generated files
        run: |
          python3 -m json.tool assets/data/bible/kor/NEH.json >/dev/null
          python3 -m json.tool assets/data/bible/kor/manifest.json >/dev/null
          python3 tools/apply_bible_reader.py --check

      - name: Commit generated changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/bible/kor/NEH.json assets/data/bible/kor/manifest.json
          git add ot nt theology 2>/dev/null || true
          git commit -m "Build Bible data and apply shared reader"
          git push origin main
