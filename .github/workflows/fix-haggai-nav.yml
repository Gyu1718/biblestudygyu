name: Fix Haggai chapter navigation

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-haggai-nav.yml

permissions:
  contents: write

jobs:
  fix-navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Repair chapter links
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path('ot/haggai/ch01.html'): [
                  ('<a href="ch01.html" aria-current="page">1</a>', '<a href="./ch01.html" aria-current="page" aria-label="학개 1장 현재 페이지">1</a>'),
                  ('<a href="#" title="준비 중">2</a>', '<a href="./ch02.html" aria-label="학개 2장으로 이동">2</a>'),
              ],
              Path('ot/haggai/ch02.html'): [
                  ('<a href="ch01.html">1</a>', '<a href="./ch01.html" aria-label="학개 1장으로 이동">1</a>'),
                  ('<a href="ch02.html" aria-current="page">2</a>', '<a href="./ch02.html" aria-current="page" aria-label="학개 2장 현재 페이지">2</a>'),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f'Expected navigation markup not found in {path}: {old}')
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
              if text == original:
                  raise SystemExit(f'No changes made to {path}')

          checks = {
              Path('ot/haggai/ch01.html'): 'href="./ch02.html"',
              Path('ot/haggai/ch02.html'): 'href="./ch01.html"',
          }
          for path, expected in checks.items():
              if expected not in path.read_text(encoding='utf-8'):
                  raise SystemExit(f'Navigation check failed for {path}: {expected}')
          PY

      - name: Remove one-shot workflow and commit fix
        shell: bash
        run: |
          rm .github/workflows/fix-haggai-nav.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ot/haggai/ch01.html ot/haggai/ch02.html .github/workflows/fix-haggai-nav.yml
          git commit -m "Repair Haggai chapter navigation"
          git push origin main
