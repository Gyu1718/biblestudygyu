<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>기독교 강요 권별 개념 색인</title>
  <meta name="description" content="칼빈 기독교 강요의 각 권을 대주제와 소주제 카드로 탐색하는 연구 색인" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-calvin-page="book">
  <header class="site-header">
    <div class="container header-grid">
      <div>
        <p class="eyebrow">Calvin Institutes</p>
        <h1>기독교 강요 권별 개념 색인</h1>
        <p class="lead">각 권을 장 번호 순서로만 보지 않고, 대주제와 소주제 카드로 묶어 연구 흐름을 확인합니다.</p>
      </div>
      <div class="status-card">
        <span class="status-label">Book View</span>

      </div>
    </div>
  </header>

  <main class="container">

      <div>
        <h2 id="calvin-search-title">이 권 안에서 검색</h2>

      <label class="search-box">
        <span class="sr-only">검색어</span>

      </label>
    </section>

    <section class="workflow-panel">
      <div>
        <p class="eyebrow">이동</p>
        <h2>다른 권으로 이동</h2>
      </div>
      <div class="workflow-links">
        <a href="calvin-book.html?book=1">제1권</a>
        <a href="calvin-book.html?book=2">제2권</a>
        <a href="calvin-book.html?book=3">제3권</a>
        <a href="calvin-book.html?book=4">제4권</a>

  <footer class="site-footer">
    <div class="container">
      <p><a href="calvin-institutes.html">← 기독교 강요 전체 색인으로</a></p>
